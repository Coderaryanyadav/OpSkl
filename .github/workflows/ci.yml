name: OpSkl Continuous Integration Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint Next.js Admin App
      run: npm run lint --prefix apps/admin --if-present

    - name: Type-check Mobile App
      run: npm run type-check --prefix apps/mobile --if-present

    - name: Run Mobile Unit Tests
      run: npm test --prefix apps/mobile --if-present
